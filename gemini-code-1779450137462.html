<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Happy Birthday Buddy!</title>
    <style>
        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
        }

        body {
            background: #0f172a;
            color: #ffffff;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            overflow: hidden;
        }

        .container {
            text-align: center;
            padding: 20px;
            width: 100%;
            max-width: 500px;
        }

        /* Screen States */
        .screen {
            display: none;
        }

        .active {
            display: block;
            animation: fadeIn 0.5s ease-in-out;
        }

        @keyframes fadeIn {
            from { opacity: 0; transform: scale(0.95); }
            to { opacity: 1; transform: scale(1); }
        }

        /* Countdown Screen */
        .timer-box {
            font-size: 3.5rem;
            font-weight: bold;
            background: rgba(255, 255, 255, 0.05);
            padding: 30px;
            border-radius: 20px;
            box-shadow: 0 8px 32px 0 rgba(0, 0, 0, 0.3);
            border: 1px solid rgba(255, 255, 255, 0.1);
            letter-spacing: 2px;
            color: #38bdf8;
            text-shadow: 0 0 10px rgba(56, 189, 248, 0.5);
        }

        .timer-label {
            font-size: 1rem;
            color: #94a3b8;
            margin-top: 10px;
            text-transform: uppercase;
        }

        /* Lock Screen */
        .lock-title {
            font-size: 1.8rem;
            margin-bottom: 20px;
            color: #e2e8f0;
        }

        .pin-display {
            font-size: 2.5rem;
            height: 60px;
            margin-bottom: 30px;
            letter-spacing: 10px;
            color: #f43f5e;
            font-weight: bold;
        }

        .keypad {
            display: grid;
            grid-template-columns: repeat(3, 1fr);
            gap: 15px;
            justify-items: center;
        }

        .key {
            width: 70px;
            height: 70px;
            border-radius: 50%;
            background: rgba(255, 255, 255, 0.1);
            border: 1px solid rgba(255, 255, 255, 0.2);
            color: white;
            font-size: 1.5rem;
            cursor: pointer;
            display: flex;
            justify-content: center;
            align-items: center;
            transition: all 0.2s;
        }

        .key:active {
            background: rgba(255, 255, 255, 0.3);
            transform: scale(0.9);
        }

        .key.clear {
            font-size: 1rem;
            background: rgba(244, 63, 94, 0.2);
        }

        /* Celebration Screen */
        .celebration-screen {
            position: relative;
        }

        .birthday-text {
            font-size: 3rem;
            font-weight: 800;
            background: linear-gradient(45deg, #f43f5e, #fbbf24, #3b82f6);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            margin-bottom: 10px;
            animation: bounce 1s infinite alternate;
        }

        .sub-text {
            font-size: 1.8rem;
            color: #fcd34d;
            text-shadow: 0 0 8px rgba(252, 211, 77, 0.5);
        }

        @keyframes bounce {
            from { transform: translateY(0); }
            to { transform: translateY(-10px); }
        }

        /* Confetti Effect */
        .confetti {
            position: absolute;
            width: 10px;
            height: 10px;
            background-color: #f39c12;
            position: absolute;
            top: -10px;
            animation: fall 3s linear infinite;
            border-radius: 50%;
        }

        @keyframes fall {
            to {
                transform: translateY(105vh) rotate(360deg);
            }
        }
    </style>
</head>
<body>

    <div class="container">
        
        <!-- SECTION 1: COUNTDOWN TIMER -->
        <div id="countdown-screen" class="screen active">
            <div class="timer-box" id="timer">00:02:02</div>
            <div class="timer-label">Booster Initiating In...</div>
        </div>

        <!-- SECTION 2: LOCK SCREEN -->
        <div id="lock-screen" class="screen">
            <div class="lock-title">Enter Secret PIN to Unlock</div>
            <div class="pin-display" id="pin-display"></div>
            <div class="keypad">
                <button class="key" onclick="pressKey('1')">1</button>
                <button class="key" onclick="pressKey('2')">2</button>
                <button class="key" onclick="pressKey('3')">3</button>
                <button class="key" onclick="pressKey('4')">4</button>
                <button class="key" onclick="pressKey('5')">5</button>
                <button class="key" onclick="pressKey('6')">6</button>
                <button class="key" onclick="pressKey('7')">7</button>
                <button class="key" onclick="pressKey('8')">8</button>
                <button class="key" onclick="pressKey('9')">9</button>
                <button class="key clear" onclick="clearPin()">Clear</button>
                <button class="key" onclick="pressKey('0')">0</button>
            </div>
        </div>

        <!-- SECTION 3: CELEBRATION SCREEN -->
        <div id="celebration-screen" class="screen celebration-screen">
            <h1 class="birthday-text">Happy Birthday Buddy! 🎉</h1>
            <h2 class="sub-text">Happy 24th Birthday! 🎂</h2>
        </div>

    </div>

    <script>
        // --- COUNTDOWN LOGIC ---
        // 2 minutes and 2 seconds = 122 seconds total
        let totalSeconds = (0 * 3600) + (2 * 60) + 2; 
        const timerElement = document.getElementById('timer');

        function updateTimer() {
            let hours = Math.floor(totalSeconds / 3600);
            let minutes = Math.floor((totalSeconds % 3600) / 60);
            let seconds = totalSeconds % 60;

            // Formating to 2 digits (e.g. 02 instead of 2)
            hours = String(hours).padStart(2, '0');
            minutes = String(minutes).padStart(2, '0');
            seconds = String(seconds).padStart(2, '0');

            timerElement.textContent = `${hours}:${minutes}:${seconds}`;

            if (totalSeconds <= 0) {
                clearInterval(countdownInterval);
                switchScreen('countdown-screen', 'lock-screen');
            } else {
                totalSeconds--;
            }
        }

        const countdownInterval = setInterval(updateTimer, 1000);
        updateTimer(); // Pehli baar फौरन chalane ke liye

        // --- SCREEN SWITCHER ---
        function switchScreen(hideId, showId) {
            document.getElementById(hideId).classList.remove('active');
            document.getElementById(showId).classList.add('active');
        }

        // --- LOCK SCREEN LOGIC ---
        let enteredPin = "";
        const correctPin = "2323";
        const pinDisplay = document.getElementById('pin-display');

        function pressKey(num) {
            if (enteredPin.length < 4) {
                enteredPin += num;
                // Display me dots ya stars dikhane ke liye takay pin secret lagay
                pinDisplay.textContent = "*".repeat(enteredPin.length);
            }

            if (enteredPin.length === 4) {
                // Thora sa delay takay user ko aakhri star lagta hoa dikhay
                setTimeout(() => {
                    if (enteredPin === correctPin) {
                        switchScreen('lock-screen', 'celebration-screen');
                        startCelebration();
                    } else {
                        alert("Wrong PIN! Try again.");
                        clearPin();
                    }
                }, 200);
            }
        }

        function clearPin() {
            enteredPin = "";
            pinDisplay.textContent = "";
        }

        // --- CELEBRATION (CONFETTI) LOGIC ---
        function startCelebration() {
            const colors = ['#f43f5e', '#fbbf24', '#3b82f6', '#10b981', '#a855f7'];
            
            // 100 random confetti pieces generate karne ke liye
            for (let i = 0; i < 100; i++) {
                const confetti = document.createElement('div');
                confetti.classList.add('confetti');
                
                // Random styles
                confetti.style.left = Math.random() * 100 + 'vw';
                confetti.style.backgroundColor = colors[Math.floor(Math.random() * colors.length)];
                confetti.style.animationDelay = Math.random() * 2 + 's';
                confetti.style.animationDuration = (Math.random() * 3 + 2) + 's'; // 2s se 5s tak fall speed
                confetti.style.width = Math.random() * 8 + 6 + 'px';
                confetti.style.height = confetti.style.width;

                document.body.appendChild(confetti);
            }
        }
    </script>
</body>
</html>
